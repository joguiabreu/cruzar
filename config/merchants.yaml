# Merchant catalogue + regex patterns (SPEC §Inputs). Seeded into the
# `merchants` / `merchant_patterns` tables each run (ADR-3). Lower priority
# wins; ties broken by insertion id (ADR-13). Patterns are regexes matched
# case-insensitively (re.search) against transactions.description_raw — use
# \b...\b word boundaries to avoid accidental substring hits (e.g. \bBP\b
# does NOT match "BPI"). A rule overrides an `llm` guess; nothing overrides
# `manual`. Only well-known BRAND patterns belong here — never a personal
# name, a one-off payee, or anything that identifies you (privacy invariant).
merchants:
  # --- Groceries -------------------------------------------------------------
  - name: Continente
    category: Groceries
    patterns:
      - pattern: '\bContinente\b'
        priority: 100
  - name: Pingo Doce
    category: Groceries
    patterns:
      - pattern: 'Pingo Doce'
        priority: 100
  - name: Lidl
    category: Groceries
    patterns:
      - pattern: '\bLidl\b'
        priority: 100
  - name: Auchan
    category: Groceries
    patterns:
      - pattern: '\bAuchan\b'
        priority: 100
  - name: Minipreço
    category: Groceries
    patterns:
      - pattern: 'Minipre[çc]o'
        priority: 100

  # --- Dining (incl. food delivery — your call) ------------------------------
